<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="./src/img/favicon.png" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css"> 
    <title>Quem é esse Pokemon?</title>
</head>
<body>
    <div class="header">
        <div class="logo">
            <img src="src/img/Pokémon-Logo.png" alt="Pokemon-logo">
        </div>
        <div class="Gerar">
            <button type="submit">
                <img src="src/img/icons8-actualizar-32.png" alt="Gerar Pokemon">
            </button>
            <button>
                <img src="src/img/icons8-ajuda-32.png" alt="Ajudar">
            </button>
        </div>
    </div>
    <hr>
    <div class="content">
        <div class="fundo-pokemon">
            <h2>Quem é esse Pokemon?</h2>
            <div class="pokemon">
                <img src="src/img/Pokémon-Logo.png" alt="Pokemon?">
            </div>
            <h3>nome do pokemon</h3>
        </div>
        <div class="informar-pokemon">
            <input type="text" placeholder="digite o pokemon" required>
        </div>
        <div class="dicaPokemon">
            <div class="dica">
                <label>dica:</label>
            </div>
            <div class="dica-pokemon">
                <label>Pokemon</label>
            </div>
        </div>
        <div class="btn-pokemon">
            <div class="btn-1">
                <button>Confirmar</button>
            </div>
            <div class="btn-2">
                <button>Resposta</button>
            </div>
        </div>
    </div>
    <hr>
    <footer class="rodape">
        <p>Copyright &copy; Flavin.com</p>
    </footer>
    <script src="main.js"></script>
</body>
</html>
